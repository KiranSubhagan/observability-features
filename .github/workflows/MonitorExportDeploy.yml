name: Deploy Lambda Terraform
 
on:
  workflow_dispatch: 

 
permissions:
  id-token: write
  contents: read
 
jobs:
 
  deploy:
 
    runs-on: ubuntu-latest
 
    env:
      AWS_REGION: us-east-1
 
    steps:
 
      - name: Checkout Repository
        uses: actions/checkout@v4
 
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387219500106:role/github_oidc_role
          aws-region: ap-south-1
 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      - name: Package Lambda
        run: |
          cd lambda
 
          chmod +x zip.sh
 
          ./zip.sh
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
 
      - name: Terraform Init
        run: |
          cd terraform
 
          terraform init
 
      - name: Terraform Validate
        run: |
          cd terraform
 
          terraform validate
 
      - name: Terraform Plan
        run: |
          cd terraform
 
          terraform plan
 
      - name: Terraform Apply
        run: |
          cd terraform
 
          terraform apply -auto-approve
